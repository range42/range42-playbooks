#### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### ####
#
# PROMOX INIT - create ubuntu noble template :
#
#   vm_id    : 9221
#   cpu core : 1
#   ram      : 4g
#   disk     : 32g
#   ip       : 192.168.140.221
#
#### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### ####

##
##

- hosts: proxmox
  gather_facts: false
  vars_files:
    - "../../../secrets/default_vault.yml"

  tasks:
    #### #### IDEMPOTENCE — skip everything if VM is already finalized as template ####
    - name: TEMPLATE 9221 - CHECK if already finalized as template
      ansible.builtin.shell: qm config 9221 2>/dev/null | grep -q '^template:'
      register: tpl_9221_is_template
      failed_when: false
      changed_when: false
      delegate_to: "{{ inventory_hostname }}-cli"

    - name: TEMPLATE 9221 - WAIT for unlock if a parallel deploy holds the VM
      ansible.builtin.shell: qm config 9221 | grep -q '^lock:'
      register: tpl_9221_lock
      until: tpl_9221_lock.rc != 0
      retries: 30
      delay: 10
      failed_when: false
      changed_when: false
      delegate_to: "{{ inventory_hostname }}-cli"
      when: tpl_9221_is_template.rc != 0

    - name: TEMPLATE 9221 - SKIP all (already finalized as template)
      ansible.builtin.debug:
        msg: "Template 9221 is already a template — skipping. Run delete-everything to recreate."
      when: tpl_9221_is_template.rc == 0

    #### #### vm_create idempotence: separate "exists" check (skip vm_create only) ####
    - name: TEMPLATE 9221 - CHECK if VM exists (vm_create idempotence)
      ansible.builtin.shell: qm config 9221 2>/dev/null
      register: tpl_9221_exists
      failed_when: false
      changed_when: false
      delegate_to: "{{ inventory_hostname }}-cli"
      when: tpl_9221_is_template.rc != 0

    - name: PROMOX INIT - TEMPLATES - CREATE TEMPLATE - template-vm-small-01-4g-32g
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "vm_create"
        # proxmox_node: "px-testing"
        vm_id: 9221
        vm_name: "template-vm-small-01-4g-32g"
        vm_cpu: "host"
        vm_cores: 1
        vm_sockets: 1
        vm_memory: 4096
        vm_net_virtio_bridge: "vmbr140"
      when:
        - tpl_9221_is_template.rc != 0
        - tpl_9221_exists.rc != 0

    ####
    - name: PROMOX INIT - TEMPLATES - WAIT for vm_create to finish (lock-aware, replaces 20s pause)
      ansible.builtin.shell: qm config 9221 | grep -q '^lock:'
      register: tpl_9221_post_create_lock
      until: tpl_9221_post_create_lock.rc != 0
      retries: 60                # 60 × 5s = 5 min max safety
      delay: 5
      failed_when: false
      changed_when: false
      delegate_to: "{{ inventory_hostname }}-cli"
      when:
        - tpl_9221_is_template.rc != 0
        - tpl_9221_exists.rc != 0
    ####

#### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### ####

- hosts: proxmox-cli
  gather_facts: false
  vars_files:
    - "../../../secrets/default_vault.yml"

  tasks:
    - name: TEMPLATE 9221 - CHECK if already template (proxmox-cli play)
      ansible.builtin.shell: qm config 9221 2>/dev/null | grep -q '^template:'
      register: tpl_9221_is_template
      failed_when: false
      changed_when: false

    #
    - name: PROMOX INIT - TEMPLATES - IMPORT CLOUD INIT DISK - template-vm-small-01-4g-32g
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "template_cloudinit_import_disk"
        proxmox_node: "px-testing-cli"
        cloudinit_image_full_path: "/var/lib/vz/template/iso/noble-minimal-cloudimg-amd64.img"
        vm_id: 9221
        vm_disk_size: "32g"
        proxmox_dest_vm_storage_name: "local-lvm"
      when: tpl_9221_is_template.rc != 0

#### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### ####

- hosts: proxmox
  gather_facts: false
  vars_files:
    - "../../../secrets/default_vault.yml"

  tasks:
    - name: TEMPLATE 9221 - CHECK if already template (third play)
      ansible.builtin.shell: qm config 9221 2>/dev/null | grep -q '^template:'
      register: tpl_9221_is_template
      failed_when: false
      changed_when: false
      delegate_to: "{{ inventory_hostname }}-cli"

    #
    - name: PROMOX INIT - TEMPLATES - SET CLOUD DEFAULT INIT VARIABLE - template-vm-small-01-4g-32g
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "cloudinit_set_variables"
        # proxmox_node: "px-testing"
        vm_id: 9221
        vm_ci_user: "{{ default_admin_vm_ci_user | default('alice') }}"
        vm_ci_password: "{{ default_trainee_vm_ci_password | default('supersecret') }}"
        vm_ci_ssh_key: "{{ default_trainee_vm_ci_ssh_key  }}"
        vm_ci_dns_ips: "1.1.1.1"
        vm_ci_ip: "192.168.140.221"
        vm_ci_netmask: "24"
        vm_ci_ip_gw: "192.168.140.1"
      when: tpl_9221_is_template.rc != 0

    #
    - name: PROMOX INIT - TEMPLATES - SET PROMOX TAG
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "vm_set_tag"
        # proxmox_node: "px-testing"
        vm_id: 9221
        vm_tag_name: "template"
      when: tpl_9221_is_template.rc != 0
