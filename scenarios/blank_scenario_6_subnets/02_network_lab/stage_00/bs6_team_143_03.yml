- hosts: proxmox
  gather_facts: false
  vars_files:
    - "../../secrets/default_vault.yml"

  tasks:

    - name: CLONE TEMPLATE - "{{ global_vm_name }}"
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "vm_clone"
        vm_id: "{{ global_template_vm_id }}"
        vm_new_id: "{{ global_vm_id }}"
        vm_name: "{{ global_vm_name }}"
        vm_description: "{{ global_vm_description }}"

    - name: WAITING FOR PROXMOX UNLOCK TO CLEAR
      ansible.builtin.pause:
        seconds: 20
        prompt: "Waiting for 20 seconds during clone..."

    - name: SET TAG - "{{ global_vm_name }}"
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "vm_set_tag"
        vm_id: "{{ global_vm_id }}"
        vm_tag_name: "{{ global_vm_tag_name }}"

    - name: SET CLOUD-INIT VARIABLES - "{{ global_vm_name }}"
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "cloudinit_set_variables"
        vm_id: "{{ global_vm_id }}"
        vm_ci_user: "{{ default_admin_vm_ci_user | default('alice') }}"
        vm_ci_password: "{{ default_admin_vm_ci_password | default('supersecret') }}"
        vm_ci_ssh_key: "{{ default_admin_vm_ci_ssh_key }}"
        vm_ci_dns_ips: "1.1.1.1"
        vm_ci_ip: "{{ global_vm_ci_ip }}"
        vm_ci_netmask: "24"
        vm_ci_ip_gw: "{{ global_vm_ci_ip_gw }}"
        vm_net_virtio_bridge: "{{ global_vm_net_bridge }}"

    - name: START VM - "{{ global_vm_name }}"
      include_role:
        name: range42-ansible_roles-proxmox_controller
      vars:
        proxmox_vm_action: "vm_start"
        vm_id: "{{ global_vm_id }}"

# #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### #### ####

- hosts: "{{ global_vm_ssh_name }}"
  gather_facts: false
  vars_files:
    - "../../secrets/default_vault.yml"

  vars:
    deployer_cli_user_ssh_known_hosts: "{{ deployer_cli_user_ssh_known_hosts }}"
    ARG_vm_ssh_name: "{{ global_vm_ssh_name }}"

    requested_tasks:
      - wait/openssh_server/is_reachable.yml
      - wait/cloudinit/is_boot_finished.yml
  tasks:
    - name: TASK DYNAMIC INCLUDE FROM ansible.utils
      include_role:
        name: ansible.utils
