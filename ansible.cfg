# Range42 playbooks ansible.cfg
#
# Codifies the sibling-repo layout that range42-init.py's deployer.repos
# role enforces (~/range42/range42-playbooks, ~/range42/range42-catalog,
# ~/range42/range42-ansible_roles-proxmox_controller).
#
# DetachedRunner symlinks playbooks into private_data_dir/project/ at deploy
# time; this cfg's relative paths resolve from there.

[defaults]
roles_path = ../range42-catalog/02_ansible_layer/admin/roles:../range42-ansible_roles-proxmox_controller/roles:roles
inventory = ./inventory
host_key_checking = False
retry_files_enabled = False
forks = 25
gathering = smart
stdout_callback = default
nocows = 1

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
# Per-host control path namespaced via %C (hash of host+port+user) so concurrent
# deploys don't share SSH multiplex sockets. DetachedRunner overrides this further
# via ANSIBLE_SSH_CONTROL_PATH_DIR=$private_data_dir/.ssh-cm/ for full isolation.
control_path_dir = ~/.ansible/cp/%%C-%%r@%%h:%%p
